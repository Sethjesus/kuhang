<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<title>動力小船模擬考</title>

<style>

body{
font-family:Arial;
background:#eef3f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

.option{
border:1px solid #ccc;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#e6f3ff;
}

.selected{
background:#cfe6ff;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

img{
max-width:400px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>動力小船模擬考</h2>

<button onclick="startQuiz()">開始考試</button>

<div id="quiz"></div>

</div>

<script>

let bank=[]
let questions=[]
let answers=[]
let current=0


async function loadQuestions(){

const res = await fetch("questions.json")

bank = await res.json()

console.log("題庫:",bank.length)

}


function startQuiz(){

questions=[...bank]
.sort(()=>0.5-Math.random())
.slice(0,20)

answers=new Array(questions.length).fill(null)

current=0

render()

}


function render(){

const q=questions[current]

let html=`

<h3>第 ${current+1} 題</h3>

<p>${q.q}</p>

`

// 顯示圖片題

if(q.img){

html+=`<img src="${q.img}.jpg">`

}

q.a.forEach((opt,i)=>{

let cls="option"

if(answers[current]===i) cls+=" selected"

html+=`

<div class="${cls}" onclick="select(${i})">

${String.fromCharCode(65+i)}. ${opt}

</div>

`

})

html+=`

<br>

<button onclick="prev()">上一題</button>

<button onclick="next()">下一題</button>

<button onclick="submitQuiz()">交卷</button>

`

document.getElementById("quiz").innerHTML=html

}


function select(i){

answers[current]=i

render()

}


function prev(){

if(current>0){

current--

render()

}

}


function next(){

if(current<questions.length-1){

current++

render()

}

}


function submitQuiz(){

let correct=0

questions.forEach((q,i)=>{

if(answers[i]===q.c){

correct++

}

})

let score=Math.round(correct/questions.length*100)

document.getElementById("quiz").innerHTML=`

<h2>成績 ${score} 分</h2>

<p>答對 ${correct}/${questions.length}</p>

<button onclick="startQuiz()">重新測驗</button>

`

}


loadQuestions()

</script>

</body>

</html>
